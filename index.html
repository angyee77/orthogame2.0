<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrthoSlot Mobile</title>
    <style>
        :root {
            --niti: #7f8c8d; --ss: #ecf0f1; --tma: #b8a05e;
            --gum: #e5989b; --tooth: #fdfcf0;
        }

        * { box-sizing: border-box; touch-action: none; } /* Prevents accidental zooming/scrolling */

        body {
            margin: 0; padding: 0; background: #000;
            color: white; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Responsive Game Container */
        #game-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            max-height: 100vh;
            max-width: 177.78vh; /* Prevents overflow on tall screens */
            background: #4a332d;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* --- THE SURGERY SETTING --- */
        .cheek-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 75% 50%, transparent 15%, #6d4c41 70%);
            pointer-events: none; z-index: 5;
        }

        .mouth-mirror {
            position: absolute; left: 5%; top: 20%;
            width: 25%; height: 45%;
            border: 6px solid #95a5a6; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            z-index: 4;
        }

        #fog {
            position: absolute; inset: 0;
            background: white; opacity: 0;
            pointer-events: none; z-index: 15;
            animation: breathFog 7s infinite ease-in-out;
        }

        @keyframes breathFog {
            0%, 100% { opacity: 0; }
            45%, 55% { opacity: 0.75; filter: blur(10px); }
        }

        /* --- TEETH ARCH --- */
        #arch {
            position: absolute; right: 10%; top: 50%;
            transform: translateY(-50%);
            display: flex; gap: 3%; width: 50%; justify-content: flex-end;
        }

        .tooth {
            width: 20%; aspect-ratio: 1/1.4; background: var(--tooth);
            border-radius: 5px 5px 40% 40%; position: relative;
        }

        .tube {
            position: absolute; top: 25%; left: 10%;
            width: 80%; height: 25%; background: #7f8c8d;
            border: 1px solid #333; display: flex; 
            justify-content: center; align-items: center;
        }

        .slot { background: #111; }
        .slot.round { width: 30%; aspect-ratio: 1/1; border-radius: 50%; }
        .slot.rect { width: 70%; height: 40%; }

        /* --- MOBILE UI --- */
        .tray {
            position: absolute; left: 3%; bottom: 5%;
            z-index: 20; display: flex; gap: 10px;
        }

        .wire-btn {
            padding: 10px; background: rgba(0,0,0,0.7); border: 2px solid #555;
            border-radius: 8px; font-size: 0.8rem; min-width: 80px; text-align: center;
        }

        .wire-btn.selected { border-color: #3498db; color: #3498db; }

        /* --- THE TOOL (UNDER FINGER) --- */
        #pliers {
            position: absolute; width: 80px; pointer-events: none; z-index: 100;
            display: none;
        }

        .held-wire {
            position: absolute; top: 10px; left: -60px;
            width: 60px; height: 4px; transform-origin: right center;
        }

        .niti-anim { background: var(--niti); animation: vibrate 0.1s infinite; }
        .ss-style { background: var(--ss); height: 8px; top: 8px; }
        .tma-style { background: var(--tma); height: 6px; transform: rotate(-4deg); }

        @keyframes vibrate { 0% { transform: scaleY(1); } 50% { transform: scaleY(1.4); } }

        #msg { 
            position: absolute; top: 5%; width: 100%; 
            text-align: center; font-size: 1.2rem; z-index: 30; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div id="fog"></div>
    <div class="cheek-overlay"></div>
    <div class="mouth-mirror"></div>

    <div class="tray">
        <div class="wire-btn" id="btn-niti" onclick="pickWire('niti')">NiTi</div>
        <div class="wire-btn" id="btn-tma" onclick="pickWire('tma')">TMA</div>
        <div class="wire-btn" id="btn-ss" onclick="pickWire('ss')">SS</div>
    </div>

    <div id="arch">
        <div class="tooth"><div class="tube" data-type="niti"><div class="slot round"></div></div></div>
        <div class="tooth"><div class="tube" data-type="tma"><div class="slot rect"></div></div></div>
        <div class="tooth"><div class="tube" data-type="ss"><div class="slot rect" style="height:60%"></div></div></div>
    </div>

    <div id="pliers">
        <svg viewBox="0 0 100 40" width="80">
            <path d="M100,20 L40,10 L30,20 L40,30 Z" fill="#bdc3c7" />
        </svg>
        <div id="wire-visual" class="held-wire"></div>
    </div>

    <div id="msg">PICK A WIRE</div>
</div>

<script>
    let activeWire = null;
    const pliers = document.getElementById('pliers');
    const wireVisual = document.getElementById('wire-visual');
    const msg = document.getElementById('msg');
    const viewport = document.getElementById('game-viewport');

    function pickWire(type) {
        activeWire = type;
        document.querySelectorAll('.wire-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn-' + type).classList.add('selected');
        
        pliers.style.display = 'block';
        wireVisual.className = 'held-wire ' + 
            (type === 'niti' ? 'niti-anim' : type === 'ss' ? 'ss-style' : 'tma-style');
        msg.innerText = "DRAG TO TUBE";
    }

    function handleMove(e) {
        if (!activeWire) return;
        
        // Get touch or mouse position relative to viewport
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = viewport.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        
        // Offset pliers so they appear slightly above the finger/cursor for visibility
        pliers.style.left = (x) + 'px';
        pliers.style.top = (y - 40) + 'px';

        checkCollision(clientX, clientY);
    }

    function checkCollision(cX, cY) {
        const tubes = document.querySelectorAll('.tube');
        let found = false;
        
        tubes.forEach(tube => {
            const r = tube.getBoundingClientRect();
            // Check if finger/wire tip is over the tube
            if (cX > r.left && cX < r.right && cY > r.top && cY < r.bottom)
