<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrthoSlot: Mirror Challenge</title>
    <style>
        :root {
            --niti: #7f8c8d; --ss: #ecf0f1; --tma: #b8a05e;
            --gum: #e5989b; --tooth: #fdfcf0;
        }

        body {
            margin: 0; background: #1a1a1a; color: white;
            font-family: 'Arial', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-viewport {
            position: relative; width: 900px; height: 600px;
            background: #4a332d; border: 8px solid #333;
            border-radius: 20px; overflow: hidden; cursor: none;
        }

        /* --- THE SURGERY SETTING --- */
        .cheek-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 70% 50%, transparent 20%, #6d4c41 60%);
            pointer-events: none; z-index: 5;
        }

        .mouth-mirror {
            position: absolute; left: 150px; top: 150px;
            width: 180px; height: 180px;
            border: 10px solid #95a5a6; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.5);
            z-index: 4;
        }

        /* --- FOGGING EFFECT --- */
        #fog {
            position: absolute; inset: 0;
            background: white; opacity: 0;
            pointer-events: none; z-index: 15;
            animation: breathFog 6s infinite ease-in-out;
        }

        @keyframes breathFog {
            0%, 100% { opacity: 0; }
            40%, 60% { opacity: 0.7; filter: blur(8px); }
        }

        /* --- TEETH & BRACKETS --- */
        #arch {
            position: absolute; right: 100px; top: 50%;
            transform: translateY(-50%); display: flex; gap: 15px;
        }

        .tooth {
            width: 70px; height: 90px; background: var(--tooth);
            border-radius: 5px 5px 30px 30px; position: relative;
            box-shadow: inset -5px -10px 10px rgba(0,0,0,0.1);
        }

        .tube {
            position: absolute; top: 30px; left: 10px;
            width: 50px; height: 25px; background: #7f8c8d;
            border: 1px solid #333; display: flex; 
            justify-content: center; align-items: center;
        }

        .slot { background: #111; border: 1px solid #444; }
        .slot.round { width: 12px; height: 12px; border-radius: 50%; }
        .slot.rect { width: 30px; height: 10px; }

        /* --- UI & TOOLS --- */
        .tray {
            position: absolute; left: 20px; top: 20px;
            z-index: 20; display: flex; flex-direction: column; gap: 10px;
        }

        .wire-btn {
            padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid #555;
            cursor: pointer; text-align: center; width: 120px;
        }

        .wire-btn:hover { background: #333; }
        .wire-btn.selected { border-color: #3498db; box-shadow: 0 0 10px #3498db; }

        /* --- THE PLIERS (CURSOR) --- */
        #pliers {
            position: absolute; width: 120px; pointer-events: none; z-index: 100;
        }

        .held-wire {
            position: absolute; top: 15px; left: -80px;
            transform-origin: right center;
        }

        .niti-anim { height: 3px; width: 80px; background: var(--niti); animation: vibrate 0.1s infinite; }
        .ss-style { height: 8px; width: 80px; background: var(--ss); }
        .tma-style { height: 6px; width: 80px; background: var(--tma); transform: rotate(-3deg); }

        @keyframes vibrate { 0% { transform: translateY(0); } 50% { transform: translateY(1px); } 100% { transform: translateY(0); } }

        #msg { position: absolute; bottom: 50px; width: 100%; text-align: center; font-size: 24px; z-index: 30; }
    </style>
</head>
<body>

<div id="game-viewport">
    <div id="fog"></div>
    <div class="cheek-overlay"></div>
    <div class="mouth-mirror"></div>

    <div class="tray">
        <div class="wire-btn" onclick="pickWire('niti', this)">Round NiTi</div>
        <div class="wire-btn" onclick="pickWire('ss', this)">Rect. SS</div>
        <div class="wire-btn" onclick="pickWire('tma', this)">Rect. TMA</div>
    </div>

    <div id="arch">
        <div class="tooth"><div class="tube" data-type="niti"><div class="slot round"></div></div></div>
        <div class="tooth"><div class="tube" data-type="tma"><div class="slot rect"></div></div></div>
        <div class="tooth"><div class="tube" data-type="ss"><div class="slot rect" style="height:14px"></div></div></div>
    </div>

    <div id="pliers">
        <svg viewBox="0 0 100 40" width="120">
            <path d="M100,20 L40,10 L30,20 L40,30 Z" fill="#bdc3c7" stroke="#7f8c8d"/>
        </svg>
        <div id="wire-visual" class="held-wire"></div>
    </div>

    <div id="msg">Select a wire and drag it into the correct tube...</div>
</div>

<script>
    let activeWire = null;
    const pliers = document.getElementById('pliers');
    const wireVisual = document.getElementById('wire-visual');
    const msg = document.getElementById('msg');

    function pickWire(type, el) {
        activeWire = type;
        document.querySelectorAll('.wire-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        
        wireVisual.className = 'held-wire ' + 
            (type === 'niti' ? 'niti-anim' : type === 'ss' ? 'ss-style' : 'tma-style');
        msg.innerText = "Carefully align the tip of the wire with the tube.";
    }

    document.addEventListener('mousemove', (e) => {
        const rect = document.getElementById('game-viewport').getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        pliers.style.left = x + 'px';
        pliers.style.top = y + 'px';

        if (activeWire) {
            checkCollision(x - 80, y + 15); // Adjust for wire tip position
        }
    });

    function checkCollision(wireX, wireY) {
        const tubes = document.querySelectorAll('.tube');
        tubes.forEach(tube => {
            const r = tube.getBoundingClientRect();
            const vRect = document.getElementById('game-viewport').getBoundingClientRect();
            
            // Checking if the wire tip is inside the tube area
            if (wireX + vRect.left > r.left && wireX + vRect.left < r.right &&
                wireY + vRect.top > r.top && wireY + vRect.top < r.bottom) {
                
                if (tube.getAttribute('data-type') === activeWire) {
                    msg.style.color = "#2ecc71";
                    msg.innerText = "MATCH FOUND! Release to Slot.";
                    tube.style.boxShadow = "0 0 15px #2ecc71";
                } else {
                    msg.style.color = "#e74c3c";
                    msg.innerText = "SIZE MISMATCH!";
                }
            } else {
                tube.style.boxShadow = "none";
            }
        });
    }

    // Drop logic
    document.addEventListener('mouseup', () => {
        const highlighted = document.querySelector('.tube[style*="box-shadow"]');
        if (highlighted && activeWire === highlighted.getAttribute('data-type')) {
            msg.innerText = "SUCCESS! Wire Seated.";
            activeWire = null;
            wireVisual.className = 'held-wire';
            highlighted.style.background = "#2ecc71";
        }
    });
</script>
</body>
</html>
